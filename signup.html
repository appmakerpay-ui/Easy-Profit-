<!DOCTYPE html>
<html>
<head>
<style>
  body { background: linear-gradient(to right, #4facfe, #8e44ad); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe, #9d50bb); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
  <div class="card">
    <h2>Signup</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="registerUser()">REGISTER</button>
    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function registerUser() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    db.collection("users").doc(email).set({
      name: name,
      email: email,
      password: password,
      balance: 0,
      createdAt: new Date().toISOString()
    })
    .then(() => {
      alert("Registration Successful!");
    })
    .catch((error) => {
      alert("Error: " + error.message);
    });
  }
</script>
</body>
</html>
