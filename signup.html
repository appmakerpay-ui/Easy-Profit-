<!DOCTYPE html>
<html>
<head>
<style>
  body { background: linear-gradient(to right, #4facfe, #8e44ad); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 300px; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe, #9d50bb); color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
  <div class="card">
    <h2>Signup</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="registerUser()">REGISTER</button>
    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBErejMEZ5G5W9SFgHu3VP6eauJ6qH01tY",
    authDomain: "daily-profit-f3c64.firebaseapp.com",
    projectId: "daily-profit-f3c64",
    storageBucket: "daily-profit-f3c64.firebasestorage.app",
    messagingSenderId: "626488854693",
    appId: "1:626488854693:web:bea3a1ee5c04e76341a54c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.registerUser = function() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    setDoc(doc(db, "users", email), {
      name: name,
      email: email,
      password: password,
      balance: 0,
      createdAt: new Date().toISOString()
    })
    .then(() => { alert("Registration Successful!"); })
    .catch((error) => { alert("Error: " + error.message); });
  }
</script>
</body>
</html>
