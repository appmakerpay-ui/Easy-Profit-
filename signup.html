<!DOCTYPE html>
<html>
<head>
<style>
  body { background: linear-gradient(to right, #4facfe, #8e44ad); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe, #9d50bb); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
  <div class="card">
    <h2>Signup</h2>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Password">
    <button>REGISTER</button>
    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>
</body>
</html>
