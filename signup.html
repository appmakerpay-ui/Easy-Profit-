<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      background-color: #0b0e14; 
      color: #ffffff; 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
    .card { 
      background: #151a23; 
      border: 1px solid #2b3648; 
      border-radius: 20px; 
      padding: 30px; 
      width: 100%; 
      max-width: 400px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    input { 
      width: 100%; 
      padding: 15px; 
      margin: 10px 0; 
      background: #0b0e14; 
      border: 1px solid #2b3648; 
      border-radius: 12px; 
      color: white; 
      box-sizing: border-box; 
    }
    button { 
      width: 100%; 
      padding: 15px; 
      background: linear-gradient(90deg, #00b894, #00cec9); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
      cursor: pointer; 
      margin-top: 10px;
    }
    a { color: #00cec9; text-decoration: none; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Signup</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="registerUser()">REGISTER</button>
    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBErejMEZ5G5W9SFgHu3VP6eauJ6qH01tY",
    authDomain: "daily-profit-f3c64.firebaseapp.com",
    projectId: "daily-profit-f3c64",
    storageBucket: "daily-profit-f3c64.firebasestorage.app",
    messagingSenderId: "626488854693",
    appId: "1:626488854693:web:bea3a1ee5c04e76341a54c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.registerUser = function() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    setDoc(doc(db, "users", email), {
      name: name,
      email: email,
      password: password,
      balance: 0,
      createdAt: new Date().toISOString()
    })
    .then(() => { alert("Registration Successful!"); })
    .catch((error) => { alert("Error: " + error.message); });
  }
</script>
</body>
</html>
