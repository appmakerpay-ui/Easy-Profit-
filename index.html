<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
    <style>
        body { background: linear-gradient(to right, #4facfe, #8e44ad); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(to right, #4facfe, #9d50bb); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Register</h2>
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPass" placeholder="Password">
        <input type="text" id="refBy" placeholder="Referral Code (Optional)">
        <button onclick="registerUser()">REGISTER</button>
    </div>

    <div class="card">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="loginUser()">LOGIN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBErejMEZ5G5W9SFgHu3VP6eauJ6qH01tY",
            authDomain: "daily-profit-f3c64.firebaseapp.com",
            projectId: "daily-profit-f3c64",
            storageBucket: "daily-profit-f3c64.firebasestorage.app",
            messagingSenderId: "626488854693",
            appId: "1:626488854693:web:bea3a1ee5c04e76341a54c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Register Function
        function registerUser() {
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPass").value;
            const refBy = document.getElementById("refBy").value;

            if(!email || !password) { alert("Please enter email and password"); return; }

            auth.createUserWithEmailAndPassword(email, password).then(() => {
                db.collection("users").doc(email).set({
                    email: email,
                    balance: 0,
                    referredBy: refBy || "None"
                }).then(() => {
                    alert("Registration Successful!");
                    localStorage.setItem("userEmail", email);
                    window.location.href = "dashboard.html";
                });
            }).catch(e => alert(e.message));
        }

        // Login Function
        function loginUser() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPass").value;

            auth.signInWithEmailAndPassword(email, password).then(() => {
                localStorage.setItem("userEmail", email);
                window.location.href = "dashboard.html";
            }).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
