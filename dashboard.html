<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background-color: #0b101d; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
  .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .profile-icon { background: #1a4dbd; padding: 10px 15px; border-radius: 50%; font-weight: bold; }
  .main-card { background: #1a4dbd; border-radius: 20px; padding: 25px; }
  .balance-title { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
  .amount { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
  .btn-group { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-deposit { background: #ffffff; color: #1a4dbd; }
  .btn-withdraw { background: rgba(255,255,255,0.2); color: white; }
  .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
  .box { background: #151a23; padding: 20px; border-radius: 15px; border: 1px solid #2b3648; }
  .label { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
  .value { font-size: 18px; font-weight: bold; }
  .roi-tracker { background: #151a23; padding: 20px; border-radius: 15px; border: 1px solid #2b3648; margin-top: 20px; }
  .roi-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2b3648; }
</style>
</head>
<body>

  <div class="top-header">
    <div><p style="margin:0; font-size: 14px;">Welcome back,</p><h2 style="margin:0;">test01</h2></div>
    <div class="profile-icon">👤</div>
  </div>

  <div class="main-card">
    <div class="balance-title">TOTAL BALANCE</div>
    <div class="amount">$0.00</div>
    <div class="btn-group">
      <button class="btn btn-deposit" onclick="showDeposit()">+ Deposit</button>
      <button class="btn btn-withdraw" onclick="showWithdraw()">↑ Withdraw</button>
    </div>
  </div>

  <div id="deposit-section" style="display:none; background: #151a23; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #2b3648;">
    <p>BEP20 Address:</p>
    <p id="bep20" style="background: #0b0e14; padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all;">0xf9e9866ab52ff0e349843118a48b4236768163c0</p>
    <button onclick="copyText('bep20')" style="background: #1a4dbd; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">Copy BEP20</button>
    <p style="margin-top: 15px;">TRC20 Address:</p>
    <p id="trc20" style="background: #0b0e14; padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all;">TKuTTWK7inXRtg6Kic2K59jPCSXaVRqahB</p>
    <button onclick="copyText('trc20')" style="background: #1a4dbd; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">Copy TRC20</button>
  </div>

  <h3>Performance Overview</h3>
  <div class="grid-container">
    <div class="box"><div class="label">Daily ROI</div><div class="value">+0.00%</div></div>
    <div class="box"><div class="label">Today's Earnings</div><div class="value">$0.00</div></div>
  </div>

  <div class="roi-tracker">
    <h3>Daily ROI Tracker</h3>
    <div class="roi-row"><span>Principal</span><span>$0.00</span></div>
    <div class="roi-row"><span>Total Earned</span><span>+$0.00</span></div>
  </div>

  <script>
    function showDeposit() {
      var section = document.getElementById('deposit-section');
      section.style.display = (section.style.display === "none") ? "block" : "none";
    }
    function copyText(id) {
      var text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => { alert("Address Copied!"); });
    }
    function showWithdraw() {
      alert("You can withdraw only the profit amount after 30 days.");
    }
  </script>
</body>
</html>
