<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background-color: #0b101d; color: white; font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 90px; }
  .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .profile-icon { background: #1a4dbd; padding: 10px 15px; border-radius: 50%; font-weight: bold; }
  .main-card { background: #1a4dbd; border-radius: 20px; padding: 25px; }
  .balance-title { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
  .amount { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
  .btn-group { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-deposit { background: #ffffff; color: #1a4dbd; }
  .btn-withdraw { background: rgba(255,255,255,0.2); color: white; }
  
  .section-title { font-size: 18px; margin: 25px 0 15px 0; }
  .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .box { background: #151a23; padding: 20px; border-radius: 15px; border: 1px solid #2b3648; }
  .label { font-size: 12px; opacity: 0.7; margin-bottom: 5px; }
  .value { font-size: 18px; font-weight: bold; }
  
  .roi-tracker { background: #151a23; padding: 20px; border-radius: 15px; border: 1px solid #2b3648; margin-top: 20px; }
  .roi-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2b3648; }

  .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #151a23; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2b3648; z-index: 1000; }
  .nav-item { text-align: center; font-size: 12px; color: #888; }
</style>
</head>
<body>

  <div class="top-header">
    <div>
        <p style="margin:0; font-size: 14px;">Welcome back,</p>
        <h2 style="margin:0;">Welcome User</h2>
    </div>
    <div class="profile-icon">👤</div>
  </div>

  <div class="main-card">
    <div class="balance-title">TOTAL BALANCE</div>
    <div class="amount">$0.00</div>
    <div class="btn-group">
      <button class="btn btn-deposit" onclick="showDeposit()">+ Deposit</button>
      <button class="btn btn-withdraw" onclick="showWithdraw()">↑ Withdraw</button>
    </div>
  </div>

  <div id="deposit-section" style="display:none; background: #151a23; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #2b3648;">
    <p>BEP20: 0xf9e9...63c0</p>
    <button onclick="copyText('0xf9e9866ab52ff0e349843118a48b4236768163c0')" style="background: #1a4dbd; color: white; border: none; padding: 5px 10px; border-radius: 5px;">Copy BEP20</button>
  </div>

  <div class="section-title">Performance Overview</div>
  <div class="grid-container">
    <div class="box"><div class="label">Daily ROI</div><div class="value">+0.00%</div></div>
    <div class="box"><div class="label">Today's Earnings</div><div class="value">$0.00</div></div>
  </div>

  <div class="roi-tracker">
    <div class="section-title" style="margin-top:0;">Daily ROI Tracker</div>
    <div class="roi-row"><span>Principal</span><span>$0.00</span></div>
    <div class="roi-row"><span>Total Earned</span><span>+$0.00</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-item">🏠<br>Dashboard</div>
    <div class="nav-item">📜<br>History</div>
    <div class="nav-item">👤<br>Profile</div>
  </div>

  <script>
    function showDeposit() { var s = document.getElementById('deposit-section'); s.style.display = (s.style.display === "none") ? "block" : "none"; }
    function copyText(txt) { navigator.clipboard.writeText(txt); alert("Address Copied!"); }
    function showWithdraw() { alert("You can withdraw only the profit amount after 30 days."); }
  </script>
</body>
</html>
